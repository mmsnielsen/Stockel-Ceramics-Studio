<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="studio-webpage">
      <header class="header">
        <a href="index.html" class="logo">
          <span class="logo__text">Stockel</span>
          <div class="logo__square"></div>
          <!-- The simple square outline -->
          <span class="logo__text">Ceramics</span>
        </a>

        <nav class="navigation">
          <ul class="nav-list">
            <li><a href="#about" class="nav-link">About</a></li>
            <li><a href="#workshops" class="nav-link">Workshops</a></li>
            <li><a href="#classes" class="nav-link">Classes</a></li>
            <li><a href="#memberships" class="nav-link">Memberships</a></li>
            <li><a href="#contact" class="nav-link">Contact</a></li>
          </ul>
        </nav>
      </header>
      <section class="gallery-grid">
        <div class="gallery-item">
          <img src="image/bisque-firing.jpg" alt="Bisque Firing" />
        </div>
        <div class="gallery-item">
          <img src="image/drying-shelf.jpg" alt="Drying Shelf" />
        </div>
        <div class="gallery-item">
          <img src="image/classes.jpg" alt="Classes" />
        </div>
        <div class="gallery-item">
          <img src="image/wheel-throwing.jpg" alt="Pottery Wheel" />
        </div>
        <div class="gallery-item">
          <img src="image/student-works-01.jpg" alt="Student Works" />
        </div>
        <div class="gallery-item">
          <img src="image/glazed-plates.jpg" alt="Glazed Plates" />
        </div>
        <!-- Add as many as you like! -->
      </section>

      <footer class="footer">
        <div class="site-footer__container">
          <div class="site-footer__top-row">
            <nav class="site-footer__nav">
              <a href="index.html">Home</a>
              <a href="#about">Our Story</a>
              <a href="#workshops">Courses</a>
              <a href="shop.html">Studio Shop</a>
              <a href="gallery.html">Gallery</a>
              <a href="#contact">Terms of Service</a>
            </nav>
            <div class="site-footer__socials">
              <a
                href="https://instagram.com/stockelceramics"
                target="_blank"
                aria-label="Instagram"
                class="social-icons"
              >
                <img
                  src="image/instagram-logo.svg"
                  alt="IG logo"
                  class="social-logo-svg"
                />
              </a>
              <a
                href="#contact"
                aria-label="Contact Email"
                class="social-icons"
              >
                <img
                  src="image/email-logo.svg"
                  alt="Email logo"
                  class="social-logo-svg"
                />
              </a>
            </div>
          </div>

          <hr class="site-footer__divider" />

          <div class="site-footer__bottom-row">
            <div class="site-footer__brand">
              <span class="site-footer__logo">Stockel</span>
              <div class="site-footer__logo-square"></div>
              <!-- The simple square outline -->
              <span class="site-footer__logo">Ceramics</span>
            </div>
            <p class="site-footer__copyright">
              © 2026 Stockel ⃞ Ceramics. All rights reserved.
            </p>
          </div>
        </div>
      </footer>
    </main>
  </body>
</html>
