<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="studio-webpage">
      <header class="header">
        <a href="index.html" class="logo">
          <span class="logo__text">Stockel</span>
          <div class="logo__square"></div>
          <!-- The simple square outline -->
          <span class="logo__text">Ceramics</span>
        </a>

        <nav class="navigation">
          <ul class="nav-list">
            <li><a href="index.html#about" class="nav-link">About</a></li>
            <li>
              <a href="index.html#workshops" class="nav-link">Workshops</a>
            </li>
            <li><a href="index.html#classes" class="nav-link">Classes</a></li>
            <li>
              <a href="index.html#memberships" class="nav-link">Memberships</a>
            </li>
            <li><a href="index.html#contact" class="nav-link">Contact</a></li>
            <li>
              <a href="#cart" class="nav-link nav-cart" id="nav-cart-trigger">
                <img
                  src="image/cart-shopping.svg"
                  class="nav-cart__icon"
                  alt="Shopping Cart Icon"
                />
                <span class="nav-cart-count" id="global-cart-count">0</span>
              </a>
            </li>
          </ul>
        </nav>
      </header>

      <div class="gallery-year__header">
        <h2>2026</h2>
        <hr />
      </div>

      <section class="gallery-grid">
        <div class="gallery-item">
          <img src="image/bisque-firing.jpg" alt="Bisque Firing" />
        </div>
        <div class="gallery-item">
          <img src="image/drying-shelf.jpg" alt="Drying Shelf" />
        </div>
        <div class="gallery-item">
          <img src="image/classes.jpg" alt="Classes" />
        </div>
      </section>

      <div class="gallery-year__header">
        <h2>2025</h2>
        <hr />
      </div>

      <section class="gallery-grid">
        <div class="gallery-item">
          <img src="image/wheel-throwing.jpg" alt="Pottery Wheel" />
        </div>
        <div class="gallery-item">
          <img src="image/student-works-01.jpg" alt="Student Works" />
        </div>
        <div class="gallery-item">
          <img src="image/glazed-plates.jpg" alt="Glazed Plates" />
        </div>
        <!-- Add more here -->
      </section>

      <footer class="footer">
        <div class="site-footer__container">
          <div class="site-footer__top-row">
            <nav class="site-footer__nav">
              <a href="index.html">Home</a>
              <a href="index.html#about">Our Story</a>
              <a href="index.html#workshops">Courses</a>
              <a href="shop.html">Studio Shop</a>
              <a href="gallery.html">Gallery</a>
              <a href="terms.html">Terms of Service</a>
            </nav>
            <div class="site-footer__socials">
              <a
                href="https://instagram.com/stockelceramics"
                target="_blank"
                aria-label="Instagram"
                class="social-icons"
              >
                <img
                  src="image/instagram-logo.svg"
                  alt="IG logo"
                  class="social-logo-svg"
                />
              </a>
              <a
                href="index.html#contact"
                aria-label="Contact Email"
                class="social-icons"
              >
                <img
                  src="image/email-logo.svg"
                  alt="Email logo"
                  class="social-logo-svg"
                />
              </a>
            </div>
          </div>

          <hr class="site-footer__divider" />

          <div class="site-footer__bottom-row">
            <div class="site-footer__brand">
              <span class="site-footer__logo">Stockel</span>
              <div class="site-footer__logo-square"></div>
              <!-- The simple square outline -->
              <span class="site-footer__logo">Ceramics</span>
            </div>
            <p class="site-footer__copyright">
              © 2026 Stockel ⃞ Ceramics. All rights reserved.
            </p>
          </div>
        </div>
      </footer>
    </main>

    <!-- CART SIDEBAR -->

    <div class="cart-sidebar-overlay hidden-cart" id="cart-sidebar">
      <div class="cart-sidecar-panel">
        <div class="cart-sidecar__header">
          <img
            src="image/cart-arrow-down.svg"
            class="cart-sidecar__icon"
            alt="Cart Down Arrow Icon"
          />
          <h2>Added to cart!</h2>
        </div>

        <div class="cart-sidecar__content" id="cart-items-list">
          <!-- Dynamically populated cart items will go here -->
        </div>

        <div class="cart-panel__footer">
          <a href="shop.html" class="btn-view-cart" id="btn-view-cart"
            >View Cart (1)</a
          >
          <a href="checkout.html" class="btn-checkout" id="btn-checkout"
            >Checkout</a
          >
        </div>
      </div>
    </div>

    <script src="src/index.js"></script>
  </body>
</html>
